<div class="flex h-screen w-screen overflow-hidden bg-slate-50/50 p-4 font-sans text-slate-800 antialiased selection:bg-[#E1111C]/10">
  
  <aside
    class="relative flex flex-col rounded-3xl border border-slate-200/60 bg-white/80 shadow-sm backdrop-blur-xl transition-all duration-300 ease-out"
    [class.w-64]="sidebarAbierto()"
    [class.w-24]="!sidebarAbierto()"
  >
    <div class="flex h-20 items-center px-6" [class.justify-center]="!sidebarAbierto()">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-[#E1111C] text-xl shadow-md shadow-[#E1111C]/20 ring-4 ring-[#E1111C]/10 text-white">
          💊
        </div>
        @if (sidebarAbierto()) {
          <span class="bg-gradient-to-r from-slate-900 via-slate-800 to-[#E1111C] bg-clip-text text-lg font-bold tracking-tight text-transparent">
            PharmaDash
          </span>
        }
      </div>
    </div>

    <nav class="mt-2 flex-1 space-y-1.5 px-4">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-[#E1111C]/5 text-[#E1111C] font-semibold ring-1 ring-[#E1111C]/10"
          [routerLinkActiveOptions]="{ exact: true }"
          class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-500 transition-all duration-200 hover:bg-slate-50 hover:text-slate-950"
          [class.justify-center]="!sidebarAbierto()"
          [title]="!sidebarAbierto() ? item.label : ''"
        >
          <app-icon 
            [name]="item.icon" 
            [size]="20" 
            class="transition-transform group-hover:scale-105"
          />
          @if (sidebarAbierto()) {
            <span class="tracking-wide">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="p-4">
      <button
        type="button"
        (click)="authService.logout()"
        class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-400 transition-all duration-200 hover:bg-rose-50 hover:text-rose-600"
        [class.justify-center]="!sidebarAbierto()"
        [title]="!sidebarAbierto() ? 'Cerrar sesión' : ''"
      >
        <app-icon name="logout" [size]="20" />
        @if (sidebarAbierto()) {
          <span>Cerrar sesión</span>
        }
      </button>
    </div>
  </aside>

  <div class="ml-4 flex flex-1 flex-col overflow-hidden">
    
    <header class="flex h-20 shrink-0 items-center justify-between rounded-3xl border border-slate-200/60 bg-white/80 px-8 shadow-sm backdrop-blur-xl">
      
      <button
        type="button"
        (click)="alternarSidebar()"
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 transition-all hover:bg-slate-50 hover:text-slate-900 active:scale-95"
      >
        <app-icon name="grid" [size]="18" />
      </button>

      <div class="flex items-center gap-4">
        <div class="hidden text-right sm:block">
          <p class="text-sm font-semibold tracking-tight text-slate-900">
            {{ authService.usuario()?.nombre }}
          </p>
          <p class="text-xs font-medium text-slate-400">
            {{ authService.rolActual() }}
          </p>
        </div>
        
        <div class="relative group cursor-pointer">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-[#E1111C]/10 text-sm font-bold text-[#E1111C] ring-2 ring-white shadow-sm transition-transform group-hover:scale-105">
            {{ authService.usuario()?.nombre?.charAt(0) ?? '?' }}
          </div>
          <span class="absolute bottom-0 right-0 h-3 w-3 rounded-full border-2 border-white bg-emerald-500"></span>
        </div>
      </div>
    </header>

    <main class="mt-4 flex-1 overflow-y-auto rounded-3xl border border-slate-200/60 bg-white/60 p-8 shadow-sm backdrop-blur-xl">
      <router-outlet />
    </main>
  </div>

</div>
