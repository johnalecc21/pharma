<form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-5">
  <div class="grid gap-5 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label class="mb-1.5 block text-sm font-medium text-slate-600">Nombre</label>
      <input
        type="text"
        formControlName="nombre"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-slate-600">Categoría</label>
      <input
        type="text"
        formControlName="categoria"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-slate-600">SKU</label>
      <input
        type="text"
        formControlName="sku"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-slate-600">Precio unitario</label>
      <input
        type="number"
        step="0.01"
        formControlName="precioUnitario"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-slate-600">Stock</label>
      <input
        type="number"
        formControlName="stock"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1.5 block text-sm font-medium text-slate-600">Fecha de vencimiento</label>
      <input
        type="date"
        formControlName="fechaVencimiento"
        class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20"
      />
    </div>
  </div>

  @if (errorMensaje()) {
    <p class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-600">
      {{ errorMensaje() }}
    </p>
  }

  <div class="flex justify-end gap-3 pt-2">
    <button
      type="button"
      (click)="cancelado.emit()"
      class="rounded-xl px-4 py-2.5 text-sm font-semibold text-slate-500 transition hover:bg-slate-100"
    >
      Cancelar
    </button>
    <button
      type="submit"
      [disabled]="guardando()"
      class="rounded-xl bg-gradient-to-r from-brand-500 to-accent-500 px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-brand-500/20 transition hover:opacity-90 disabled:opacity-60"
    >
      {{ guardando() ? 'Guardando...' : 'Guardar' }}
    </button>
  </div>
</form>
