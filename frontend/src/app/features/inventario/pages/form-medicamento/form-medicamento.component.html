<form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-6">
  <div class="grid gap-5 sm:grid-cols-2">
    
    <div class="sm:col-span-2">
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">Nombre del medicamento</label>
      <input
        type="text"
        formControlName="nombre"
        placeholder="Ej. Acetaminofén 500mg"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 px-4 text-sm font-medium text-slate-800 placeholder-slate-400 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">Categoría</label>
      <input
        type="text"
        formControlName="categoria"
        placeholder="Ej. Analgésicos"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 px-4 text-sm font-medium text-slate-800 placeholder-slate-400 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">SKU / Código</label>
      <input
        type="text"
        formControlName="sku"
        placeholder="Ej. PH-84920"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 px-4 font-mono text-sm text-slate-800 placeholder-slate-400 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5 uppercase"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">Precio unitario</label>
      <div class="relative">
        <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-sm font-bold text-slate-400">$</span>
        <input
          type="number"
          step="0.01"
          formControlName="precioUnitario"
          placeholder="0.00"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 pl-8 pr-4 text-sm font-bold text-slate-800 placeholder-slate-400 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5"
        />
      </div>
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">Unidades en Stock</label>
      <input
        type="number"
        formControlName="stock"
        placeholder="0"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 px-4 text-sm font-bold text-slate-800 placeholder-slate-400 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5"
      />
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">Fecha de vencimiento</label>
      <input
        type="date"
        formControlName="fechaVencimiento"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50/60 py-3 px-4 text-sm font-medium text-slate-800 outline-none transition-all duration-200 focus:border-[#E1111C]/40 focus:bg-white focus:ring-4 focus:ring-[#E1111C]/5"
      />
    </div>
  </div>

  @if (errorMensaje()) {
    <div class="flex items-center gap-2.5 rounded-2xl border border-rose-100 bg-rose-50/60 p-3.5 text-sm font-medium text-rose-600 shadow-[0_2px_8px_rgba(225,29,72,0.02)]">
      <span class="flex h-5 w-5 shrink-0 items-center justify-center rounded-lg bg-rose-100 text-xs text-rose-600 font-bold">!</span>
      <p>{{ errorMensaje() }}</p>
    </div>
  }

  <div class="flex justify-end gap-3 pt-3 border-t border-slate-100/80">
    <button
      type="button"
      (click)="cancelado.emit()"
      class="rounded-2xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-bold text-[#E1111C] shadow-sm transition-all duration-200 hover:bg-[#E1111C]/5 hover:border-[#E1111C]/20 active:scale-95"
    >
      Cancelar
    </button>
    <button
      type="submit"
      [disabled]="guardando()"
      class="rounded-2xl bg-[#E1111C] px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-[#E1111C]/15 transition-all duration-200 hover:bg-[#ff2530] disabled:opacity-50 disabled:pointer-events-none active:scale-95"
    >
      {{ guardando() ? 'Guardando...' : 'Guardar medicamento' }}
    </button>
  </div>
</form>
