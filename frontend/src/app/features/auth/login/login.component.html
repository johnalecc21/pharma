<div
  class="relative flex min-h-screen items-center justify-center overflow-hidden bg-slate-950 px-4"
>
  <div
    class="absolute -top-32 -left-32 h-96 w-96 rounded-full bg-brand-500/30 blur-3xl"
  ></div>
  <div
    class="absolute -bottom-32 -right-32 h-96 w-96 rounded-full bg-accent-500/30 blur-3xl"
  ></div>

  <form
    class="relative z-10 w-full max-w-md rounded-3xl border border-white/10 bg-white/[0.06] p-8 shadow-2xl backdrop-blur-xl sm:p-10"
    [formGroup]="form"
    (ngSubmit)="enviar()"
  >
    <div class="mb-8 flex flex-col items-center text-center">
      <div
        class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-400 to-accent-500 text-2xl shadow-lg shadow-brand-500/30"
      >
        💊
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-white">PharmaDash</h1>
      <p class="mt-1 text-sm text-slate-400">Inicia sesión para gestionar tu farmacia</p>
    </div>

    <div class="space-y-4">
      <div>
        <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">
          Email
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@farmacia.com"
          class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/30"
        />
      </div>

      <div>
        <label for="password" class="mb-1.5 block text-sm font-medium text-slate-300">
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/30"
        />
      </div>
    </div>

    @if (errorMensaje()) {
      <p
        class="mt-4 rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-300"
      >
        {{ errorMensaje() }}
      </p>
    }

    <button
      type="submit"
      [disabled]="cargando()"
      class="mt-6 flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-500 to-accent-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-500/20 transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
    >
      @if (cargando()) {
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
        ></span>
      }
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </form>
</div>
