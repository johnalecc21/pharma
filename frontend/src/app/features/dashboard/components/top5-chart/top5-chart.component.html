<div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-5 text-lg font-bold text-slate-800">Top 5 medicamentos más vendidos</h2>

  @if (barras().length === 0) {
    <p class="py-10 text-center text-sm text-slate-400">Aún no hay ventas registradas</p>
  } @else {
    <div class="flex h-56 items-end gap-4 px-2">
      @for (barra of barras(); track barra.nombre) {
        <div class="flex h-full flex-1 flex-col items-center justify-end">
          <span class="mb-1.5 text-sm font-bold text-slate-700">{{ barra.totalVendido }}</span>
          <div class="flex h-full w-full items-end">
            <div
              class="w-full rounded-t-lg bg-gradient-to-t from-brand-500 to-accent-500 transition-all"
              [style.height.%]="barra.porcentaje"
              style="min-height: 6px"
            ></div>
          </div>
          <span class="mt-2 line-clamp-2 text-center text-xs font-medium text-slate-500">
            {{ barra.nombre }}
          </span>
        </div>
      }
    </div>
  }
</div>
