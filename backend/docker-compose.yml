services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmadash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-pharmadash}
    ports:
      - '5432:5432'
    volumes:
      - pharmadash-postgres-data:/var/lib/postgresql/data

volumes:
  pharmadash-postgres-data:
